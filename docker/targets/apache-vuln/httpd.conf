ServerRoot "/usr/local/apache2"
Listen 80
LoadModule mpm_prefork_module modules/mod_mpm_prefork.so
LoadModule authz_core_module modules/mod_authz_core.so
LoadModule dir_module modules/mod_dir.so
LoadModule mime_module modules/mod_mime.so
LoadModule log_config_module modules/mod_log_config.so
LoadModule unixd_module modules/mod_unixd.so
LoadModule headers_module modules/mod_headers.so

# ── INTENTIONALLY VULNERABLE CONFIGURATION ──
# No mod_reqtimeout  -> Slowloris works perfectly
# Low MaxRequestWorkers -> exhausted quickly
# No KeepAliveTimeout -> connections held indefinitely

ServerName apache-vuln
ServerAdmin lab@dosarena.local

<IfModule mpm_prefork_module>
    StartServers          5
    MinSpareServers       5
    MaxSpareServers      10
    MaxRequestWorkers   150
    MaxConnectionsPerChild 0
</IfModule>

# KeepAlive ON with no timeout — Slowloris paradise
KeepAlive On
KeepAliveTimeout 0
Timeout 300

# NO mod_reqtimeout loaded — no header/body read timeout

TypesConfig conf/mime.types
DirectoryIndex index.html

DocumentRoot "/usr/local/apache2/htdocs"

<Directory "/usr/local/apache2/htdocs">
    Options None
    AllowOverride None
    Require all granted
</Directory>

# Expose server info (useful for target identification in training)
ServerTokens Full
ServerSignature On
Header always set X-Server-Info "Apache/2.4 Vulnerable Lab Target"

LogFormat "%h %l %u %t \"%r\" %>s %b" combined
ErrorLog /proc/self/fd/2
CustomLog /proc/self/fd/1 combined
