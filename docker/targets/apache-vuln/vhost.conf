# Virtual host with endpoints of varying cost
# Useful for testing cache busting and HTTP flood

<VirtualHost *:80>
    ServerName apache-vuln
    DocumentRoot /usr/local/apache2/htdocs

    # /slow — simulates a slow DB query via sleep (via CGI if enabled)
    # For training: use this endpoint for HTTP flood
    Alias /search /usr/local/apache2/htdocs/search.html
    Alias /api    /usr/local/apache2/htdocs/api.html
    Alias /upload /usr/local/apache2/htdocs/upload.html
    Alias /login  /usr/local/apache2/htdocs/login.html
</VirtualHost>
