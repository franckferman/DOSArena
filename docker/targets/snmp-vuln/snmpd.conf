# Net-SNMP configuration — INTENTIONALLY VULNERABLE
# Community string "public" — default, widely exposed
# Full MIB-II accessible: maximizes GetBulk response size
# No source IP restriction: any host can query

# VULNERABLE: community "public" with no source restriction
rocommunity public default

# Expose all OIDs including system, interfaces, IP routing table
# This maximizes the GetBulk response size -> higher amp factor
view   systemview included   .1
view   systemview included   .1.3.6.1.2.1.1
view   systemview included   .1.3.6.1.2.1.2
view   systemview included   .1.3.6.1.2.1.4
view   systemview included   .1.3.6.1.2.1.6
view   systemview included   .1.3.6.1.2.1.7
view   systemview included   .1.3.6.1.2.1.25

# Agent information
sysDescr   DOSArena SNMP Vulnerable Target v1.0
sysContact lab@dosarena.local
sysName    snmp-vuln.dosarena.local
sysLocation DOSArena Docker Lab

# Allow GetBulk from any source
agentAddress udp:161

