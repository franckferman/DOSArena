worker_processes auto;
events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    # Rate limiting zones
    limit_req_zone  $binary_remote_addr zone=http_limit:10m rate=100r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # Timeout configuration — resistant to Slowloris
    client_header_timeout  10s;    # Header must arrive within 10s
    client_body_timeout    10s;    # Body read timeout
    send_timeout           10s;
    keepalive_timeout      30s;
    keepalive_requests     100;

    server {
        listen 80;
        server_name nginx-protected;

        # Connection and request rate limits
        limit_req  zone=http_limit burst=200 nodelay;
        limit_conn conn_limit 20;

        location / {
            root /usr/share/nginx/html;
            index index.html;
        }

        location /search {
            limit_req zone=http_limit burst=50;
            try_files $uri $uri/ =404;
        }

        location /api {
            limit_req zone=http_limit burst=20 nodelay;
            try_files $uri $uri/ =404;
        }

        # Expose server info for training identification
        add_header X-Server-Info "nginx Protected Lab Target";
    }
}
