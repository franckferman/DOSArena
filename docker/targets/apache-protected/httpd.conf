ServerRoot "/usr/local/apache2"
Listen 80

LoadModule mpm_prefork_module modules/mod_mpm_prefork.so
LoadModule authz_core_module  modules/mod_authz_core.so
LoadModule dir_module         modules/mod_dir.so
LoadModule mime_module        modules/mod_mime.so
LoadModule log_config_module  modules/mod_log_config.so
LoadModule unixd_module       modules/mod_unixd.so
LoadModule reqtimeout_module  modules/mod_reqtimeout.so
LoadModule headers_module     modules/mod_headers.so

# ── HARDENED CONFIGURATION ──
# mod_reqtimeout   -> kills Slowloris and Slow POST
# SYN cookies      -> set via sysctl in docker-compose
# iptables rules   -> applied in entrypoint.sh

ServerName apache-protected

<IfModule mpm_prefork_module>
    StartServers          10
    MinSpareServers       10
    MaxSpareServers       20
    MaxRequestWorkers    400
    MaxConnectionsPerChild 1000
</IfModule>

# Tight timeouts — kills Slowloris
KeepAlive On
KeepAliveTimeout 5
Timeout 30

# mod_reqtimeout — kills Slowloris headers AND Slow POST body
<IfModule mod_reqtimeout.c>
    RequestReadTimeout header=10-20,MinRate=500
    RequestReadTimeout body=10-30,MinRate=500
</IfModule>

TypesConfig conf/mime.types
DirectoryIndex index.html
DocumentRoot "/usr/local/apache2/htdocs"

<Directory "/usr/local/apache2/htdocs">
    Options None
    AllowOverride None
    Require all granted
</Directory>

ServerTokens Prod
ServerSignature Off
Header always unset X-Powered-By
Header always set X-Server-Info "Protected Target"

LogFormat "%h %l %u %t \"%r\" %>s %b" combined
ErrorLog /proc/self/fd/2
CustomLog /proc/self/fd/1 combined
