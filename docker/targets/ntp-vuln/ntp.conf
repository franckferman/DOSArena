# NTP configuration — INTENTIONALLY VULNERABLE
# monlist enabled: responds to mode 7 requests from any source
# Amplification factor: ~550x

driftfile /var/lib/ntp/ntp.drift

# VULNERABLE: allow queries from any source
restrict default nomodify notrap nopeer
restrict 0.0.0.0 mask 0.0.0.0 nomodify notrap nopeer

# VULNERABLE: mode 7 (monlist) enabled — NOT disabled
# To protect: add "disable monitor" here
# disable monitor  <- commented out intentionally

# Local clock as fallback
server 127.127.1.0
fudge  127.127.1.0 stratum 10

# Allow all queries (for lab purposes)
restrict 10.0.0.0 mask 255.0.0.0 nomodify notrap nopeer

# Statistics for training observation
statsdir /var/log/ntpstats/
statistics loopstats peerstats clockstats
filegen loopstats  file loopstats  type day enable
filegen peerstats  file peerstats  type day enable
filegen clockstats file clockstats type day enable
